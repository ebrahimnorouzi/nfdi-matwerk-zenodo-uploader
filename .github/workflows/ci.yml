name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint & type-check backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install ruff mypy pydantic pydantic-settings fastapi httpx itsdangerous starlette aiofiles python-jose python-multipart
      - name: Ruff lint
        run: ruff check backend/app
      - name: Mypy type check
        run: mypy backend/app --ignore-missing-imports

  build-backend:
    name: Build backend Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t matwerk-backend ./backend

  build-frontend:
    name: Build frontend Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t matwerk-frontend ./frontend

  build-docs:
    name: Build docs Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t matwerk-docs ./docs
