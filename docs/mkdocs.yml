site_name: NFDI-MatWerk Zenodo Uploader
site_description: Documentation for the NFDI-MatWerk Zenodo upload portal
site_url: http://localhost:8080
repo_url: https://github.com/ebrahimnorouzi/nfdi-matwerk-zenodo-uploader
repo_name: nfdi-matwerk-zenodo-uploader
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/logo.svg

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - user-guide/index.md
    - user-guide/login.md
    - user-guide/metadata.md
    - user-guide/upload.md
    - user-guide/publish.md
  - Developer Guide:
    - developer/index.md
    - developer/architecture.md
    - developer/deployment.md
    - developer/oauth-setup.md
  - API Reference:
    - api/index.md
  - About:
    - about/index.md
    - about/community.md
    - about/license.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ebrahimnorouzi/nfdi-matwerk-zenodo-uploader
    - icon: fontawesome/solid/globe
      link: https://nfdi-matwerk.de
  analytics:
    provider: custom
